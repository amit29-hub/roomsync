<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RoomSync</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body class="form-page">

  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">🏠</div>
      <h2>RoomSync</h2>
    </a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="login.html" class="active">Login</a></li>
      <li><a href="search.html">Search</a></li>
      <li><a href="dashboard.html">Dashboard <span class="badge">3</span></a></li>
    </ul>
    <button class="theme-btn" onclick="toggleDarkMode()">🌙 Dark</button>
  </nav>

  <main class="form-container">
    <section class="form-card animate-in">
      <div class="form-card-header">
        <div class="form-card-icon">👋</div>
        <h1>Welcome back</h1>
        <p class="form-intro">Log in to continue searching for compatible roommates.</p>
      </div>
      <form onsubmit="return loginUser()">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input type="text" id="username" name="username" placeholder="Enter your username or email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit">Log In →</button>
      </form>
      <div class="form-divider">or</div>
      <p class="form-link">Don't have an account? <a href="register.html">Create one free</a></p>
    </section>
  </main>

  <footer>
    <span class="footer-logo">🏠 RoomSync</span>
    <p>© 2026 RoomSync. Built by Amit Mukhram.</p>
  </footer>

</body>
</html>
